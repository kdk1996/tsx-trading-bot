name: Run Trading Bot Daily

on:
  schedule:
    - cron: '0 21 * * 1-5' # Runs at 4 PM EST
  workflow_dispatch:      # Allows you to click the button manually

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # This helps it run faster next time

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run bot
        env:
          ALPHA_VANTAGE_KEY: ${{ secrets.ALPHA_VANTAGE_KEY }}
        run: python bot.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add portfolio.csv trades.csv
          git commit -m "Update portfolio and trades" || echo "No changes to commit"
          git push
