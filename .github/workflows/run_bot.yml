name: Run Trading Bot Daily
on:
  schedule:
    - cron: '0 21 * * *' 
  workflow_dispatch: 

# This part fixes the permission error
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Fixes the warning you got
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: pip install yfinance pandas
        
      - name: Run Bot logic
        run: python bot.py
        
      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add trades.csv
          git commit -m "Automated Trade Update: $(date)" || echo "No changes to commit"
          git push
