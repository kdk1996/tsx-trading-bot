name: Run Trading Bot Daily
on:
  schedule:
    - cron: '0 21 * * *' # Runs at 21:00 UTC (4 PM EST)
  workflow_dispatch: # Allows you to run it manually with a button

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: pip install yfinance pandas
        
      - name: Run Bot logic
        run: python bot.py
        
      - name: Commit and Push Database changes
        run: |
          git config --global user.name "TSX-Bot"
          git config --global user.email "bot@example.com"
          git add paper_trading.db
          git commit -m "Automated Trade Update: $(date)" || exit 0
          git push
