name: Run Trading Bot Daily
on:
  schedule:
    - cron: '0 21 * * *' # 4 PM EST
  workflow_dispatch: # Allows manual start

# This specifically gives the bot permission to save the CSV
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: pip install yfinance pandas
        
      - name: Run Bot logic
        run: python bot.py
        
      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add trades.csv
          # This line prevents the error if the bot finds no new trades
          git commit -m "Automated Trade Update: $(date)" || echo "No changes to commit"
          git push
